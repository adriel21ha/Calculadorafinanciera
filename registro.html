<!DOCTYPE html>
<html lang="es">
<head>
  <title>Calculadora financiera</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-box">
    <h1>Crear cuenta</h1>
    <p class="subtitle"><b>Regístrate gratis</b></p>

    <form id="registroForm">
      <div class="input-group">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre" required>
      </div>

      <div class="input-group">
        <label>Correo electrónico</label>
        <input type="email" id="regEmail" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="input-group">
        <label>Contraseña</label>
        <input type="password" id="regPassword" placeholder="Mínimo 4 caracteres" required>
      </div>

      <div class="input-group">
        <label>Teléfono</label>
        <input type="tel" id="telefono" placeholder="Tu número de teléfono" required>
      </div>

      <button type="submit" class="btn-signin">Registrarse</button>
    </form>

    <p class="signup-text">¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
